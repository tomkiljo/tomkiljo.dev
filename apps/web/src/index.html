<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tom Kiljo</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:#0d0d0d;
      color:#cdd6f4;
      font-family:ui-monospace,'Cascadia Code','Fira Code','JetBrains Mono','Courier New',monospace;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:1.5rem;
      position:relative;
      overflow:hidden;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:2;
      background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.04) 0px,
        rgba(255,255,255,0.04) 1px,
        rgba(0,0,0,0) 2px,
        rgba(0,0,0,0) 4px
      );
      mix-blend-mode:screen;
      animation:scanlines 8s linear infinite;
    }
    @keyframes scanlines{
      from{transform:translateY(0)}
      to{transform:translateY(4px)}
    }
    @media (prefers-reduced-motion: reduce){
      body::before{animation:none}
    }
    main{
      display:flex;
      flex-direction:column;
      gap:1.75rem;
      position:relative;
      z-index:1;
    }
    .banner{
      margin:0;
      color:magenta;
      line-height:1.12;
      font-size:clamp(0.9rem,2.2vw,0.9rem);
      white-space:pre;
    }
    .subtitle{color:#6c7086;margin-top:0.5rem;font-size:0.9rem}
    h2{
      color:cyan;
      font-size:1rem;
      font-weight:bold;
      margin-bottom:0.5rem;
    }
    .link-row{display:flex;align-items:center;gap:0.4rem;line-height:1.9;font-size:0.9rem}
    .arrow{color:cyan}
    a{color:blue;text-decoration:dashed underline}
    a:hover{color:cyan}
    code{
      display:inline-block;
      width: 100%;
      background:#1e1e2e;
      color:#a6e3a1;
      padding:0.5rem 1rem;
      font-family:inherit;
      font-size:0.9rem;
      border-left:2px solid cyan;
      margin-top:0.375rem;
    }
    .prompt{color:cyan;margin-right:0.375rem;user-select:none}
  </style>
</head>
<body>
  <main>
    <div>
       <pre class="banner">▀█▀ █▀█ █▀▄▀█   █▄▀ █ █     █ █▀█&#10; █  █▄█ █ ▀ █   █ █ █ █▄▄ █▄█ █▄█</pre>
      <p class="subtitle">Welcome to my personal website</p>
    </div>

    <div>
      <h2>Get in touch</h2>
      <div class="link-row"><span class="arrow">→</span> Github: <a href="https://github.com/tomkiljo" target="_blank" rel="noopener noreferrer">github.com/tomkiljo</a></div>
      <div class="link-row"><span class="arrow">→</span> LinkedIn: <a href="https://linkedin.com/in/tomkiljo" target="_blank" rel="noopener noreferrer">linkedin.com/in/tomkiljo</a></div>
      <div class="link-row"><span class="arrow">→</span> Email: <a href="mailto:hi@tomkiljo.dev">hi@tomkiljo.dev</a></div>
    </div>

    <div>
      <h2>Explore</h2>
      <code><span class="prompt">$</span>ssh terminal.tomkiljo.dev</code>
    </div>
  </main>
</body>
</html>
